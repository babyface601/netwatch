<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NetWatch – Connexion</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:2.5rem 2rem;width:100%;max-width:360px}
  .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;justify-content:center}
  .logo-icon{width:40px;height:40px;background:#3b82f6;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .logo h1{font-size:1.3rem;font-weight:700;color:#f1f5f9}
  .logo span{font-size:.72rem;color:#64748b;display:block}
  .form-group{margin-bottom:1rem}
  label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:.35rem}
  input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:7px;color:#e2e8f0;padding:.55rem .75rem;font-size:.9rem;outline:none;transition:border-color .15s}
  input:focus{border-color:#3b82f6}
  .btn-login{width:100%;background:#3b82f6;color:#fff;border:none;padding:.6rem;border-radius:7px;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:1.25rem;transition:background .15s}
  .btn-login:hover{background:#2563eb}
  .error{background:#450a0a;color:#f87171;border:1px solid #7f1d1d;border-radius:7px;padding:.5rem .75rem;font-size:.8rem;margin-bottom:1rem}
  .hint{font-size:.68rem;color:#475569;text-align:center;margin-top:1.25rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <h1>NetWatch</h1>
      <span>Supervision Réseau</span>
    </div>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Utilisateur</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Se connecter</button>
  </form>

  <p class="hint">Configurez NETWATCH_USER et NETWATCH_PASSWORD via variables d'environnement.</p>
</div>
</body>
</html>
